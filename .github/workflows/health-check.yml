name: Health Check

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check calc.makrhub.io
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 https://calc.makrhub.io)
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "calc.makrhub.io is DOWN! HTTP status: $HTTP_STATUS"
            echo "CALC_DOWN=true" >> $GITHUB_ENV
          else
            echo "calc.makrhub.io is UP (HTTP $HTTP_STATUS)"
          fi

      - name: Check makrhub.io
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 https://makrhub.io)
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "makrhub.io is DOWN! HTTP status: $HTTP_STATUS"
            echo "HUB_DOWN=true" >> $GITHUB_ENV
          else
            echo "makrhub.io is UP (HTTP $HTTP_STATUS)"
          fi

      - name: Check SSL expiry
        run: |
          EXPIRY=$(echo | openssl s_client -connect calc.makrhub.io:443 -servername calc.makrhub.io 2>/dev/null | openssl x509 -noout -enddate 2>/dev/null | cut -d= -f2)
          if [ -n "$EXPIRY" ]; then
            EXPIRY_EPOCH=$(date -d "$EXPIRY" +%s 2>/dev/null || date -j -f "%b %d %T %Y %Z" "$EXPIRY" +%s 2>/dev/null)
            NOW_EPOCH=$(date +%s)
            DAYS_LEFT=$(( (EXPIRY_EPOCH - NOW_EPOCH) / 86400 ))
            echo "SSL certificate expires in $DAYS_LEFT days ($EXPIRY)"
            if [ "$DAYS_LEFT" -lt 14 ]; then
              echo "SSL_EXPIRING=true" >> $GITHUB_ENV
              echo "WARNING: SSL expires in less than 14 days!"
            fi
          fi

      - name: Create issue on failure
        if: env.CALC_DOWN == 'true' || env.HUB_DOWN == 'true' || env.SSL_EXPIRING == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const issues = [];
            if (process.env.CALC_DOWN === 'true') issues.push('- calc.makrhub.io is unreachable');
            if (process.env.HUB_DOWN === 'true') issues.push('- makrhub.io is unreachable');
            if (process.env.SSL_EXPIRING === 'true') issues.push('- SSL certificate expiring soon');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Health Check Failed — ${new Date().toISOString().split('T')[0]}`,
              body: `## Health Check Alert\n\n${issues.join('\n')}\n\n*Auto-generated by Health Check workflow*`,
              labels: ['alert', 'infrastructure']
            });
